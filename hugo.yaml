# ==========================================
# 基礎站點設定
# ==========================================
baseURL: "https://liuchien.inxpire.tw/"
title: "Liuchien's Blog"
author: "Liuchien"
theme: "hugo-theme-stack"

# 語系與 CJK 支援
languageCode: "zh-tw"
defaultContentLanguage: "zh-tw"
hasCJKLanguage: true

# 編譯設定
summaryLength: 70
publishDir: public
build:
  useResourceCacheWhen: fallback

# ==========================================
# 渲染優化 (Goldmark)
# ==========================================
markup:
  goldmark:
    extensions:
      cjk:
        eastasianLineBreaksStyle: simple
  tableOfContents:
    startLevel: 2
    endLevel: 3
  highlight:
    codeFences: true
    style: monokai
    noClasses: true

# ==========================================
# 主題參數 (Params)
# ==========================================
params:
  mainSections:
    - posts
    - post
  
  # 側邊欄：注意 avatar 必須是字串
  sidebar:
    title: "Liuchien's Blog"
    subtitle: "Digital Architect | TPM | AI"
    description: "專注於研發數位系統 與 AI 知識管理。"
    emoji: "🌞"
    avatar: "https://avatars.githubusercontent.com/u/4715649?s=400&u=74eff8fa5b60312a093911f1b7fdeb529ef02bac&v=4" # 檔案請放在 static/img/avatar.png

  # 文章功能
  article:
    showDate: true
    showReadingTime: true
    showWordCount: true
    showToc: true

  # 搜尋功能
  search:
    enabled: true
    placeholder: "想找點什麼？"

  # 留言系統 (Giscus)
  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: "你的GitHub帳號/你的Repo名稱" # 例如: liuchiente/liuchiente.github.io
      repoId: "R_xxxxxxxx"              # 前往 giscus.app 取得
      category: "Announcements"
      categoryId: "DIC_xxxxxxxx"         # 前往 giscus.app 取得
      mapping: "pathname"
      reactionsEnabled: "1"
      emitMetadata: "0"
      theme: "preferred_color_scheme"
      lang: "zh-TW"

# ==========================================
# 選單設定
# ==========================================
menu:
  main:
    - identifier: archives
      name: 歸檔
      url: /archives/
      weight: 1
      params:
        icon: archives
    - identifier: search
      name: 搜尋
      url: /search/
      weight: 2
      params:
        icon: search
    - identifier: about
      name: 關於我
      url: /about/
      weight: 3
      params:
        icon: user

# ==========================================
# 第三方服務 (GA4)
# ==========================================
services:
  googleAnalytics:
    id: "G-BP61MGQ5GV"