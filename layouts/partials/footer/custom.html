<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<div class="busuanzi-footer" style="font-size: 0.9em; color: var(--body-text-color); opacity: 0.7; margin-top: 15px; text-align: center;">
    <span id="busuanzi_container_site_pv" style="display: none;">
        🚀 總訪問量：<span id="busuanzi_value_site_pv" style="font-weight: bold;">--</span> 次
    </span>
    <span id="busuanzi_container_page_pv" style="display: none; margin-left: 10px;">
        🔥 本文閱讀：<span id="busuanzi_value_page_pv" style="font-weight: bold;">--</span> 次
    </span>
</div>

<script>
    // 數位架構師專用：強制顯示監聽器
    document.addEventListener('DOMContentLoaded', function() {
        const checkBusuanzi = setInterval(() => {
            if (document.getElementById('busuanzi_value_site_pv')?.innerText !== '--') {
                document.getElementById('busuanzi_container_site_pv').style.display = 'inline';
                document.getElementById('busuanzi_container_page_pv').style.display = 'inline';
                clearInterval(checkBusuanzi);
            }
        }, 500);
    });
</script>
